<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>67ride</title>
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020606;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(circle at center, rgba(0, 255, 230, 0.12), transparent 32%),
        linear-gradient(135deg, transparent 0 48%, rgba(0, 255, 230, 0.06) 49%, transparent 51% 100%);
      animation: bgPulse 7s ease-in-out infinite alternate;
      pointer-events: none;
    }

    .watermark {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: min(20vw, 220px);
      font-weight: 900;
      letter-spacing: 0.05em;
      color: rgba(0, 255, 230, 0.045);
      user-select: none;
      pointer-events: none;
      transform: rotate(-12deg);
      text-transform: uppercase;
    }

    .scanline {
      position: fixed;
      inset: 0;
      background: linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px);
      background-size: 100% 4px;
      opacity: 0.35;
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .cross {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    .cross::before,
    .cross::after {
      content: "";
      position: absolute;
      top: 50%;
      left: -20%;
      width: 140%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,230,0.16), transparent);
      transform-origin: center;
    }

    .cross::before { transform: rotate(35deg); }
    .cross::after { transform: rotate(-35deg); }

    .logo {
      position: fixed;
      width: min(42vw, 430px);
      max-width: 82vw;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: crossMove 11s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 30px rgba(0, 255, 230, 0.38));
      user-select: none;
      pointer-events: none;
    }

    .coming {
      position: fixed;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.58);
      font-size: 13px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .sound-button {
      position: fixed;
      left: 50%;
      bottom: 42px;
      transform: translateX(-50%);
      border: 1px solid rgba(0, 255, 230, 0.58);
      background: rgba(0, 255, 230, 0.08);
      color: #dffffb;
      padding: 14px 23px;
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.08em;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: 0.2s ease;
    }

    .sound-button:hover {
      background: rgba(0, 255, 230, 0.18);
      box-shadow: 0 0 20px rgba(0, 255, 230, 0.15);
    }

    @keyframes crossMove {
      0%   { transform: translate(-72%, -68%) scale(0.95) rotate(-1deg); }
      33%  { transform: translate(-30%, -32%) scale(1.05) rotate(1deg); }
      66%  { transform: translate(-67%, -32%) scale(1.0) rotate(-0.5deg); }
      100% { transform: translate(-28%, -68%) scale(1.04) rotate(0.5deg); }
    }

    @keyframes bgPulse {
      from { opacity: 0.65; transform: scale(1); }
      to   { opacity: 1; transform: scale(1.06); }
    }

    @media (max-width: 700px) {
      .logo { width: 72vw; }
      .watermark { font-size: 23vw; }
      .coming { bottom: 92px; font-size: 11px; }
      .sound-button { bottom: 34px; font-size: 12px; padding: 12px 18px; }
    }
  </style>
</head>
<body>
  <div class="watermark">67RIDE</div>
  <div class="cross"></div>
  <div class="scanline"></div>

  <img class="logo" src="logo.png" alt="67ride logo" />

  <div class="coming">Coming soon</div>
  <button class="sound-button" id="soundButton">ENTER / SOUND ON</button>

  <audio id="bgAudio" src="ambient.mp3" loop preload="auto"></audio>

  <script>
    const audio = document.getElementById("bgAudio");
    const button = document.getElementById("soundButton");

    audio.volume = 0.16;

    button.addEventListener("click", async () => {
      try {
        await audio.play();
        button.textContent = "SOUND ON";
      } catch (error) {
        button.textContent = "CLICK AGAIN";
      }
    });
  </script>
</body>
</html>
